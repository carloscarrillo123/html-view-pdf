<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pdf viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #2c2c2c;
      --paper: #f5f0e8;
      --ink: #1c1c1c;
      --accent: #8b1a1a;
      --accent-light: #c0392b;
      --toolbar-h: 56px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #e0e0e0;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 100;
      gap: 8px;
    }

    .toolbar-group { display: flex; align-items: center; gap: 6px; }

    .toolbar-title {
      font-size: 13px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      flex: 1;
      text-align: center;
    }

    button {
      background: none;
      border: 1px solid #555;
      color: #ddd;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    button:hover, button:active { background: #444; border-color: #888; }
    button:disabled { opacity: 0.35; cursor: default; }

    #page-info {
      font-size: 13px;
      white-space: nowrap;
      min-width: 72px;
      text-align: center;
    }

    /* ── Viewport ── */
    #viewport {
      position: fixed;
      top: var(--toolbar-h);
      left: 0; right: 0; bottom: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      padding: 20px 0 40px;
    }

    /* ── Page wrapper ── */
    .page-wrapper {
      display: flex;
      justify-content: center;
      /* min-width forces the scroll container to grow with the canvas so
         margin:auto centering works AND the left edge stays reachable */
      min-width: min-content;
      padding: 0 12px;
    }

    .page-inner {
      position: relative;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    canvas {
      display: block;
      background: var(--paper);
    }

    /* ── Loading / Error ── */
    #status {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 200;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #444;
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text { font-size: 14px; color: #aaa; }
    #error-box {
      display: none;
      background: #3a1010;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 16px 24px;
      max-width: 320px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Zoom controls ── */
    #zoom-display {
      font-size: 12px;
      min-width: 40px;
      text-align: center;
      color: #aaa;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      :root { --toolbar-h: 50px; }
      .toolbar-title { max-width: 90px; font-size: 11px; }
      #viewport { padding: 10px 0 30px; }
      .page-wrapper { padding: 0 6px; }
      button { padding: 5px 8px; font-size: 13px; }
    }

    /* swipe hint on mobile */
    @media (hover: none) {
      #viewport { cursor: default; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="toolbar-group">
    <button id="btn-prev" disabled title="Página anterior">&#8249;</button>
    <button id="btn-next" disabled title="Página siguiente">&#8250;</button>
    <span id="page-info">— / —</span>
  </div>

  <span class="toolbar-title" id="doc-title">Cargando…</span>

  <div class="toolbar-group">
    <button id="btn-zoom-out" disabled title="Reducir">&#8722;</button>
    <span id="zoom-display">100%</span>
    <button id="btn-zoom-in" disabled title="Ampliar">&#43;</button>
    <button id="btn-fit" disabled title="Ajustar al ancho">&#8596;</button>
  </div>
</div>

<div id="viewport">
  <div id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Cargando PDF…</span>
    <div id="error-box"></div>
  </div>
  <div class="page-wrapper" id="page-wrapper" style="display:none">
    <div class="page-inner" id="page-inner">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs" type="module"></script>
<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs';

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.mjs';

  const PDF_URL = 'pdf/A_Sample_PDF__1_.pdf';

  /* ── state ── */
  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let scale = 1;
  let fitScale = 1;
  let rendering = false;
  let pendingPage = null;

  /* ── DOM ── */
  const canvas       = document.getElementById('pdf-canvas');
  const ctx          = canvas.getContext('2d');
  const btnPrev      = document.getElementById('btn-prev');
  const btnNext      = document.getElementById('btn-next');
  const btnZoomIn    = document.getElementById('btn-zoom-in');
  const btnZoomOut   = document.getElementById('btn-zoom-out');
  const btnFit       = document.getElementById('btn-fit');
  const pageInfo     = document.getElementById('page-info');
  const docTitle     = document.getElementById('doc-title');
  const status       = document.getElementById('status');
  const spinner      = document.getElementById('spinner');
  const statusText   = document.getElementById('status-text');
  const errorBox     = document.getElementById('error-box');
  const pageWrapper  = document.getElementById('page-wrapper');
  const zoomDisplay  = document.getElementById('zoom-display');

  /* ── helpers ── */
  function computeFitScale(viewport) {
    const vw = document.getElementById('viewport').clientWidth - 24;
    return Math.min(1.5, vw / viewport.width);
  }

  function updateUI() {
    pageInfo.textContent = `${currentPage} / ${totalPages}`;
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
    btnZoomIn.disabled = scale >= 3;
    btnZoomOut.disabled = scale <= 0.4;
    zoomDisplay.textContent = Math.round(scale / fitScale * 100) + '%';
  }

  async function renderPage(num) {
    if (rendering) { pendingPage = num; return; }
    rendering = true;

    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale });
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = Math.floor(viewport.width  * dpr);
    canvas.height = Math.floor(viewport.height * dpr);
    canvas.style.width  = viewport.width  + 'px';
    canvas.style.height = viewport.height + 'px';

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    await page.render({ canvasContext: ctx, viewport }).promise;

    rendering = false;
    updateUI();

    if (pendingPage !== null) {
      const next = pendingPage;
      pendingPage = null;
      currentPage = next;
      await renderPage(next);
    }
  }

  async function goTo(num) {
    if (num < 1 || num > totalPages) return;
    currentPage = num;
    document.getElementById('viewport').scrollTo({ top: 0, behavior: 'smooth' });
    await renderPage(num);
  }

  /* ── Load PDF ── */
  try {
    const loadingTask = pdfjsLib.getDocument({
      url: PDF_URL,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/cmaps/',
      cMapPacked: true,
    });

    loadingTask.onProgress = ({ loaded, total }) => {
      if (total) {
        const pct = Math.round(loaded / total * 100);
        statusText.textContent = `Cargando… ${pct}%`;
      }
    };

    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;

    const firstPage = await pdfDoc.getPage(1);
    fitScale = computeFitScale(firstPage.getViewport({ scale: 1 }));
    scale = fitScale;

    docTitle.textContent = 'Libro Ovaciones · Apr 2026';
    status.style.display = 'none';
    pageWrapper.style.display = 'flex';

    [btnPrev, btnNext, btnZoomIn, btnZoomOut, btnFit].forEach(b => b.disabled = false);
    btnPrev.disabled = true;

    await renderPage(1);

  } catch (err) {
    spinner.style.display = 'none';
    statusText.style.display = 'none';
    errorBox.style.display = 'block';
    errorBox.innerHTML = `<strong>No se pudo cargar el PDF</strong><br><br>${err.message}`;
    console.error(err);
  }

  /* ── Controls ── */
  btnPrev.addEventListener('click', () => goTo(currentPage - 1));
  btnNext.addEventListener('click', () => goTo(currentPage + 1));

  btnZoomIn.addEventListener('click', async () => {
    scale = Math.min(scale * 1.25, fitScale * 3);
    await renderPage(currentPage);
  });

  btnZoomOut.addEventListener('click', async () => {
    scale = Math.max(scale / 1.25, fitScale * 0.4);
    await renderPage(currentPage);
  });

  btnFit.addEventListener('click', async () => {
    const page = await pdfDoc.getPage(currentPage);
    fitScale = computeFitScale(page.getViewport({ scale: 1 }));
    scale = fitScale;
    await renderPage(currentPage);
  });

  /* ── Keyboard ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown')
      goTo(currentPage + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp')
      goTo(currentPage - 1);
  });

  /* ── Touch swipe ── */
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartScrollX = 0;

  const vp = document.getElementById('viewport');

  vp.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
    touchStartScrollX = vp.scrollLeft;
  }, { passive: true });

  vp.addEventListener('touchend', e => {
    // Si el usuario hizo scroll horizontal real, no cambiar página
    if (Math.abs(vp.scrollLeft - touchStartScrollX) > 8) return;

    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;

    // Exigir gesto claramente horizontal y suficientemente largo
    const isHorizontal = Math.abs(dx) > Math.abs(dy) * 2;
    if (isHorizontal && Math.abs(dx) > 70) {
      if (dx < 0) goTo(currentPage + 1);
      else goTo(currentPage - 1);
    }
  }, { passive: true });

  /* ── Resize ── */
  window.addEventListener('resize', async () => {
    if (!pdfDoc) return;
    const page = await pdfDoc.getPage(currentPage);
    const newFit = computeFitScale(page.getViewport({ scale: 1 }));
    if (Math.abs(newFit - fitScale) > 0.01) {
      const ratio = scale / fitScale;
      fitScale = newFit;
      scale = fitScale * ratio;
      await renderPage(currentPage);
    }
  });
</script>
</body>
</html>
